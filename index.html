<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>김우재 | AI Dev Portfolio</title>
    <style>
        /* 1. 기본 레이아웃 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background: #f0f2f5; line-height: 1.6; text-align: center; }
        header, section, footer { padding: 2rem 5%; background: #fff; }
        
        /* 2. 디자인 요소 */
        header { border-bottom: 2px solid #007bff; }
        section { background: none; }
        h2 { color: #007bff; border-bottom: 2px solid #007bff; display: inline-block; margin-bottom: 20px; }

        /* 3. 인라인 블록 레이아웃 (Grid 대신 사용) */
        .card { 
            display: inline-block; /* 요소를 글자처럼 옆으로 나열 */
            width: 240px;
            margin: 15px;
            padding: 25px; 
            background: #fff; 
            border-radius: 12px; 
            border: 2px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            
            /* transition 속도 변화 없이 일정하게(linear) */
            transition: 0.2s linear; 
            cursor: pointer;
            text-align: left; /* 카드 내부 텍스트는 왼쪽 정렬 */
            vertical-align: top; /* 카드들 윗줄 맞춤 */
        }

        footer { font-size: 0.8rem; background: #333; color: #fff; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>AI 개발자 김우재</h1>
        <p>금오공과대학교 컴퓨터공학부 | AI 모델링 & 웹 앱 개발</p>
    </header>

    <section>
        <h2>About Me</h2>
        <p>데이터를 의미 있게 시각화하고, AI 모델을 웹에 이식하여 실용적인 가치를 만드는 개발자를 지망합니다.</p>
        
        <h2>Projects</h2>
        <div class="container">
            <div class="card">
                <h3>AI Image Classifier</h3>
                <p>실시간 사물 인식 및 분류 웹</p>
            </div>
            <div class="card">
                <h3>Study Group Manager</h3>
                <p>학업 스케줄러 프로젝트</p>
            </div>
            <div class="card">
                <h3>CSS Layout Master</h3>
                <p>Float와 Position UI 연습</p>
            </div>
        </div>
    </section>

    <footer>
        <p>© 2026 Woojae Kim. All rights reserved.</p>
    </footer>

    <script>
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            card.onmouseenter = () => {
                card.style.backgroundColor = "#eef5ff";
                card.style.borderColor = "#007bff";
            };

            card.onmouseleave = () => {
                card.style.backgroundColor = "#fff";
                card.style.borderColor = "transparent";
            };

            card.onclick = () => {
                alert(card.querySelector('h3').innerText + " 상세 보기");
            };
        });
    </script>

</body>
</html>
